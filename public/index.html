        /* --- 뉴 브루탈리즘 (Neo-Brutalism) 디자인 시스템 --- */
        :root {

            --n-offset: 4px;
            --n-offset-sm: 2px;

            box-shadow: var(--n-offset) var(--n-offset) 0 0 var(--n-border);
            background-color: white;
            border-radius: 20px;
        }
        .n-card-hover {
            transition: transform 0.1s ease, box-shadow 0.1s ease;
        }
        .n-card-hover:active {
            transform: translate(var(--n-offset), var(--n-offset));
            box-shadow: 0 0 0 0 var(--n-border);
        }

        /* 2. 대형 액션 버튼 (생성하기, 다운로드 등) */
        .n-btn {
            border: 2.5px solid var(--n-border);
            box-shadow: var(--n-offset) var(--n-offset) 0 0 var(--n-border);
            border-radius: 16px;
            font-weight: bold;
            transition: all 0.1s ease;
            cursor: pointer;
        }
        .n-btn:active {
            transform: translate(var(--n-offset), var(--n-offset)) !important;
            box-shadow: 0 0 0 0 var(--n-border) !important;
        }

        /* 3. 소형 액션 버튼 (탭, 복사하기 등) */
        .n-btn-sm {
            border: 2px solid var(--n-border);
            box-shadow: var(--n-offset-sm) var(--n-offset-sm) 0 0 var(--n-border);
            border-radius: 10px;
            font-weight: bold;
            transition: all 0.1s ease;
            cursor: pointer;
        }
        .n-btn-sm:active {
            transform: translate(var(--n-offset-sm), var(--n-offset-sm)) !important;
            box-shadow: 0 0 0 0 var(--n-border) !important;
        }

        /* 4. 입력창 (Input, Textarea, Select) */
        .n-input {
            border: 2.5px solid var(--n-border);
            background-color: #f9fafb;
            border-radius: 16px;
            transition: all 0.2s ease;

        }

                { id: 'ad-2', title: '모나미 볼펜', desc: '회의록도 업무처럼 보이게 하는 기본템', link: 'https://link.coupang.com/a/eHA94Z4nDw', visible: true, position: 'tool_bottom', badge: '광고' }

                { id: 'img-tool', name: '이미지 도구', category: 'utility', desc: '포맷 변환, 크기 조절, 그리기/자르기', icon: 'image', bg: 'bg-toss-yellow-400', color: 'text-toss-grey-900', type: 'utility' },
                { id: 'pdf-tool', name: 'PDF 도구', category: 'utility', desc: '합치기, 분할, 뷰어/형광펜, 용량 압축', icon: 'file-type-2', bg: 'bg-toss-red-500', color: 'text-white', type: 'utility' },
                { id: 'file-tool', name: '파일 도구', category: 'utility', desc: '접두사/접미사 일괄 파일명 변경', icon: 'folder-open', bg: 'bg-toss-blue-500', color: 'text-white', type: 'utility' },
                { id: 'text-tool', name: '텍스트 정리', category: 'utility', desc: '글자 수 세기, 공백/특수문자 제거', icon: 'align-left', bg: 'bg-toss-green-500', color: 'text-white', type: 'utility' },
                { id: 'link-tool', name: '링크 정리', category: 'utility', desc: '단축 URL 생성, UTM 제거, 인코딩', icon: 'link', bg: 'bg-toss-purple-500', color: 'text-white', type: 'utility' },
                { id: 'qr-tool', name: 'QR 만들기', category: 'utility', desc: '색상 및 크기 지정 가능 QR 생성', icon: 'qr-code', bg: 'bg-toss-orange-500', color: 'text-white', type: 'utility' },
                { id: 'schedule-tool', name: '일정관리', category: 'utility', desc: '업무 일정과 오늘 할 일 (우선순위)', icon: 'calendar-days', bg: 'bg-toss-teal-500', color: 'text-white', type: 'utility' },
                { id: 'recommend-tool', name: '업무 도구 추천', category: 'utility', desc: '사무실에서 쓸 생산성 툴 둘러보기', badge: '제휴', icon: 'briefcase', bg: 'bg-toss-grey-900', color: 'text-white', isHighlight: true, type: 'utility' },
                
                { id: 'email-reply', name: '메일 답장 생성기', category: 'ai', desc: '정중하고 프로페셔널한 이메일 작성', icon: 'mail', bg: 'bg-white', color: 'text-toss-blue-500', type: 'ai', template: '다음 상황에 맞는 비즈니스 이메일 답장을 작성해. 목적 및 상황: {input}.' },
                { id: 'meeting-notes', name: '회의록 생성기', category: 'ai', desc: '회의 내용 요약 및 액션 아이템 도출', icon: 'file-text', bg: 'bg-white', color: 'text-toss-green-500', type: 'ai', template: '다음 회의 내용을 바탕으로 깔끔한 회의록을 작성해. [요약], [주요 결정사항], [액션 아이템]으로 나누어 작성해. 내용: {input}' },
                { id: 'report-refine', name: '보고서 문장 다듬기', category: 'ai', desc: '대충 쓴 초안을 격식있는 보고서 톤으로', icon: 'pen-tool', bg: 'bg-white', color: 'text-toss-orange-500', type: 'ai', template: '다음 문장을 회사 보고서에 적합한 명확하며 간결한(개조식 포함) 문장으로 다듬어: {input}' },
                { id: 'status-msg', name: '상태 메시지 생성기', category: 'ai', desc: '센스있는 직장 메신저 상태 문구 작성', icon: 'message-square', bg: 'bg-white', color: 'text-toss-purple-500', type: 'ai', template: '직장 메신저(슬랙, 팀즈)에 올릴 상태 메시지를 3가지 버전으로 만들어. 상황: {input}. 센스있고 명확하게.' },
                { id: 'work-log', name: '업무일지 생성기', category: 'ai', desc: '오늘 하루 한 일을 깔끔한 일지로 정리', icon: 'calendar-check', bg: 'bg-white', color: 'text-toss-teal-500', type: 'ai', template: '오늘 한 일 목록을 바탕으로 일일 업무일지를 작성해. [금일 진행사항], [이슈], [명일 예정]으로 구조화해. 메모: {input}' },

        state.tools.forEach(t => { if(t.badge === '준비중') t.badge = null; });

        document.addEventListener('DOMContentLoaded', () => renderView());

        function handleDragOver(e) { e.preventDefault(); e.currentTarget.classList.add('bg-toss-blue-50'); }
        function handleDragLeave(e) { e.preventDefault(); e.currentTarget.classList.remove('bg-toss-blue-50'); }
        function handleDrop(e, inputId) {
            e.preventDefault(); e.currentTarget.classList.remove('bg-toss-blue-50');
            const input = document.getElementById(inputId);
            if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {
                input.files = e.dataTransfer.files;
                input.dispatchEvent(new Event('change'));
            }
        }
        function createDropZone(id, accept, multiple, onChangeStr, title, desc = "") {
            return `
                <div class="n-input border-dashed p-8 text-center cursor-pointer group" ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)" ondrop="handleDrop(event, '${id}')" onclick="document.getElementById('${id}').click()">
                    <div class="w-12 h-12 rounded-full bg-white n-border-sm flex items-center justify-center mx-auto mb-3 pointer-events-none">
                        <i data-lucide="upload-cloud" class="w-6 h-6 text-toss-grey-900 pointer-events-none"></i>
                    </div>
                    <p class="text-[15px] font-bold text-toss-grey-900 mb-1 pointer-events-none">${title}</p>
                    <p class="text-[13px] text-toss-grey-500 font-bold pointer-events-none">${desc || '여기를 클릭해서 파일을 선택하세요.'}</p>
                    <input type="file" id="${id}" accept="${accept}" ${multiple ? 'multiple' : ''} onchange="${onChangeStr}" onclick="event.stopPropagation()" class="hidden">
                </div>
            `;
        }

        function navigate(view, toolId = null) {
            if (toolId) {
                const selectedTool = state.tools.find(t => t.id === toolId);
                if (selectedTool.badge === '준비중') return showToast('해당 기능은 열심히 준비 중입니다!', 'default');
                if (selectedTool.badge === '제휴') return showToast('제휴 페이지로 이동합니다. (Mockup)', 'default');
                state.currentTool = selectedTool;
            }
            state.currentView = view;
            if(view !== 'tool') state.searchQuery = '';
            window.scrollTo(0,0);
            renderView();
        }

        function updateNavUI() {
            document.querySelectorAll('.nav-btn').forEach(btn => {
                if (btn.dataset.view === state.currentView || (state.currentView === 'tool' && btn.dataset.view === 'home')) {
                    btn.classList.add('text-toss-grey-900'); btn.classList.remove('text-toss-grey-700');
                } else {
                    btn.classList.remove('text-toss-grey-900'); btn.classList.add('text-toss-grey-700');
                }
            });
        }

        function renderView() {
            const app = document.getElementById('app');
            let html = '';
            switch (state.currentView) {
                case 'home': html = renderHome(); break;
                case 'tool': 
                    if(state.currentTool.type === 'ui') html = renderFakeWork();
                    else if(state.currentTool.type === 'utility') html = renderUtilityTool();
                    else html = renderAITool(); break;
                case 'saved': html = renderSaved(); break;
            }
            app.innerHTML = html;
            lucide.createIcons();
            updateNavUI();
            attachEventListeners();
        }

        function openAdLink(adId) {
            const ad = state.ads.find(item => item.id === adId);
            if (!ad || !ad.link || ad.link === '#') return showToast('광고 링크가 아직 설정되지 않았습니다.', 'default');
            window.open(ad.link, '_blank', 'noopener,noreferrer');
        }

        function renderAdBanner(position) {
            const ad = state.ads.find(a => a.visible && a.position === position);
            if (!ad) return '';
            return `
                <article onclick="openAdLink('${ad.id}')" class="w-full bg-toss-yellow-400 n-card n-card-hover p-[20px] mb-8 cursor-pointer flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                    <div>
                        <span class="inline-block px-2 py-[2px] bg-white n-border-sm text-toss-grey-900 text-[11px] font-bold rounded-[6px] mb-2">${ad.badge}</span>
                        <h3 class="text-[16px] font-bold text-toss-grey-900">${ad.title}</h3>
                        <p class="text-[14px] font-bold text-toss-grey-800 mt-1">${ad.desc}</p>
                        <p class="text-[11px] font-bold text-toss-grey-800 mt-2">광고 · 쿠팡 파트너스 활동으로 수수료를 제공받을 수 있음</p>
                    </div>
                    <div class="flex-shrink-0 w-10 h-10 rounded-full bg-white n-border-sm flex items-center justify-center">
                        <i data-lucide="chevron-right" class="w-5 h-5 text-toss-grey-900"></i>
                    </div>
                </article>
            `;
        }

        function renderHome() {
            const filteredTools = state.tools.filter(t => t.name.includes(state.searchQuery) || t.desc.includes(state.searchQuery));
            const renderCards = (list) => list.map(tool => `
                <article onclick="navigate('tool', '${tool.id}')" class="n-card n-card-hover cursor-pointer p-[18px] flex items-center gap-4 group mb-4">
                    <div class="w-[50px] h-[50px] rounded-full flex-shrink-0 ${tool.bg} n-border-sm flex items-center justify-center">
                        <i data-lucide="${tool.icon}" class="w-[24px] h-[24px] ${tool.color}"></i>
                    </div>
                    <div class="flex-1 min-w-0">
                        <div class="flex items-center gap-2 mb-1">
                            <h3 class="text-[17px] font-bold text-toss-grey-900 truncate tracking-tight">${tool.name}</h3>
                            ${tool.badge ? `<span class="px-2.5 py-0.5 text-[11px] font-bold rounded-[6px] n-border-sm bg-toss-yellow-400 text-toss-grey-900">${tool.badge}</span>` : ''}

                        <p class="text-[13px] text-toss-grey-600 font-bold truncate">${tool.desc}</p>

                    <div class="flex-shrink-0 w-9 h-9 rounded-full n-border-sm flex items-center justify-center bg-white group-hover:bg-toss-grey-100 transition-colors">
                        <i data-lucide="${tool.badge==='제휴'?'arrow-up-right':'chevron-right'}" class="w-[18px] h-[18px] text-toss-grey-900"></i>
                    </div>
                </article>
            `).join('');

            return `
                <div class="fade-enter max-w-[600px] mx-auto w-full px-5">
                    <section class="pt-8 pb-8">
                        <h1 class="text-[28px] md:text-[32px] font-bold text-toss-grey-900 mb-6 tracking-tight leading-tight">야금야금 업무 도구<br><span class="text-[16px] text-toss-grey-600 font-bold tracking-normal">자주 쓰는 웹 유틸리티로 바로 이동</span></h1>
                        <div class="relative">
                            <i data-lucide="search" class="absolute left-5 top-1/2 -translate-y-1/2 w-[22px] h-[22px] text-toss-grey-400"></i>

                    ${state.searchQuery === '' ? renderAdBanner('home_top') : ''}
                    ${state.searchQuery ? `
                        <section class="mb-14"><h2 class="text-[18px] font-bold text-toss-grey-900 mb-4 ml-1">검색 결과</h2>

                    ` : `
                        <section class="mb-10"><h2 class="text-[18px] font-bold text-toss-grey-900 mb-4 ml-1 flex items-center gap-2"><i data-lucide="wrench" class="w-5 h-5"></i> 웹 유틸리티 도구</h2><div class="flex flex-col">${renderCards(filteredTools.filter(t=>t.category==='utility'))}</div></section>
                        <section class="mb-10"><h2 class="text-[18px] font-bold text-toss-grey-900 mb-4 ml-1 flex items-center gap-2"><i data-lucide="sparkles" class="w-5 h-5 text-toss-blue-500"></i> AI 업무 자동화</h2><div class="flex flex-col">${renderCards(filteredTools.filter(t=>t.category==='ai'))}</div></section>
                        <section class="mb-14"><h2 class="text-[18px] font-bold text-toss-grey-900 mb-4 ml-1 flex items-center gap-2"><i data-lucide="gamepad-2" class="w-5 h-5"></i> 재미</h2><div class="flex flex-col">${renderCards(filteredTools.filter(t=>t.category==='fun'))}</div></section>

        function renderUtilityTool() {
            const tool = state.currentTool;
            let contentHtml = '';

            else if (tool.id === 'link-tool') contentHtml = renderLinkToolUI();
            else if (tool.id === 'qr-tool') contentHtml = renderQrToolUI();
            else if (tool.id === 'schedule-tool') contentHtml = renderScheduleToolUI();
            else if (tool.id === 'img-tool') contentHtml = renderImageToolUI();
            else if (tool.id === 'pdf-tool') contentHtml = renderPdfToolUI();
            else if (tool.id === 'file-tool') contentHtml = renderFileToolUI();

            return `
                <div class="fade-enter max-w-[700px] mx-auto w-full px-5">
                    <header class="flex items-center mb-8 mt-4">
                        <button onclick="navigate('home')" class="w-10 h-10 n-btn-sm bg-white flex items-center justify-center -ml-2 rounded-[12px]">
                            <i data-lucide="chevron-left" class="w-6 h-6 text-toss-grey-900"></i>
                        </button>
                        <h1 class="text-[22px] font-bold text-toss-grey-900 ml-3">${tool.name}</h1>

                        ${createDropZone('imageInput', 'image/*', true, 'handleImageUpload(this)', '이미지 파일 여러 개 드래그 앤 드롭', '썸네일을 클릭하면 그리기/자르기를 할 수 있어요.')}

        function toggleResizeMode() {
            const mode = document.querySelector('input[name="resizeMode"]:checked').value;

            } else {
                document.getElementById('resizeScaleWrap').classList.add('hidden');
                document.getElementById('resizePixelWrap').classList.remove('hidden');

        // === 공용 파일 리스트 미리보기 ===
        function formatBytes(bytes) {
            if (!+bytes) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return `${parseFloat((bytes / Math.pow(k, i)).toFixed(1))} ${sizes[i]}`;
        }

        function renderFileListPreview(input, areaId) {

            area.classList.remove('hidden');
            
            let html = '';
            Array.from(input.files).forEach((file, index) => {
                const isPdf = file.type === 'application/pdf';
                const isImg = file.type.startsWith('image/');

                if (isImg) {

                html += `

                            <p class="text-[12px] font-bold text-toss-grey-500 mt-0.5">${formatBytes(file.size)}</p>
                        </div>
                    </div>
                `;
            });
            area.innerHTML = html;
            lucide.createIcons();
        }

        // === 이미지 편집 모달 & 캔버스 ===
        let imageFilesData = [];
        let currentImgIndex = -1;
        let originalImg = new Image();
        let editorMode = 'draw';
        let cropState = { x: 0, y: 0, w: 0, h: 0 };
        let cropDragInfo = { isDragging: false, type: null, startX: 0, startY: 0, initCrop: null };

        function handleImageUpload(input) {
            const area = document.getElementById('imagePreviewArea');
            if (!input.files || input.files.length === 0) { area.classList.add('hidden'); return; }
            area.classList.remove('hidden');
            imageFilesData = []; currentImgIndex = -1;
            Array.from(input.files).forEach(file => { const url = URL.createObjectURL(file); imageFilesData.push({ file, editedUrl: url }); });
            renderImageThumbnails();
        }

        function renderImageThumbnails() {
            const area = document.getElementById('imagePreviewArea');
            area.innerHTML = '';
            imageFilesData.forEach((imgData, idx) => {
                const imgEl = document.createElement('img');
                imgEl.src = imgData.editedUrl;
                imgEl.className = `w-16 h-16 sm:w-20 sm:h-20 object-cover rounded-[12px] cursor-pointer n-border transition-transform active:translate-x-[2px] active:translate-y-[2px]`;
                imgEl.onclick = () => openImageEditor(idx);
                area.appendChild(imgEl);
            });
        }

        function openImageEditor(idx) {
            currentImgIndex = idx;
            document.getElementById('imageModalOverlay').classList.remove('hidden');
            const canvas = document.getElementById('imgCanvas');
            const ctx = canvas.getContext('2d');
            originalImg = new Image();
            originalImg.onload = () => {
                canvas.width = originalImg.width; canvas.height = originalImg.height;
                ctx.drawImage(originalImg, 0, 0);
                setupCanvasEvents(canvas);
            };
            originalImg.src = imageFilesData[idx].editedUrl;
            setEditorMode('draw');
        }

        function closeImageEditor() { document.getElementById('imageModalOverlay').classList.add('hidden'); }

        function setupCanvasEvents(canvas) {
            const newCanvas = canvas.cloneNode(true);
            canvas.parentNode.replaceChild(newCanvas, canvas);
            const newCtx = newCanvas.getContext('2d');
            newCtx.drawImage(originalImg, 0, 0);

            let isDrawing = false;
            const getCanvasPos = (e) => {
                const rect = newCanvas.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                const scaleX = newCanvas.width / rect.width;
                const scaleY = newCanvas.height / rect.height;
                return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
            };

            const moveHandler = (e) => {
                if (!isDrawing || editorMode !== 'draw') return;
                const pos = getCanvasPos(e);
                newCtx.lineTo(pos.x, pos.y); newCtx.stroke();
            };

            const upHandler = (e) => {
                if(!isDrawing) return; isDrawing = false;
                originalImg.src = newCanvas.toDataURL();
                window.removeEventListener('mousemove', moveHandler); window.removeEventListener('mouseup', upHandler);
                window.removeEventListener('touchmove', moveHandler); window.removeEventListener('touchend', upHandler);
            };

            const downHandler = (e) => {
                if (editorMode !== 'draw') return;
                isDrawing = true; const pos = getCanvasPos(e);
                newCtx.beginPath(); newCtx.moveTo(pos.x, pos.y);
                newCtx.lineWidth = 5 * (newCanvas.width / newCanvas.getBoundingClientRect().width);
                newCtx.strokeStyle = '#f04452'; newCtx.lineCap = 'round'; newCtx.lineJoin = 'round';
                window.addEventListener('mousemove', moveHandler); window.addEventListener('mouseup', upHandler);
                window.addEventListener('touchmove', moveHandler, {passive: true}); window.addEventListener('touchend', upHandler);
            };

            newCanvas.addEventListener('mousedown', downHandler);
            newCanvas.addEventListener('touchstart', downHandler, {passive: true});
            initCropEvents();
        }

        function initCropState() {
            const canvas = document.getElementById('imgCanvas'); const rect = canvas.getBoundingClientRect();
            cropState = { x: rect.width * 0.1, y: rect.height * 0.1, w: rect.width * 0.8, h: rect.height * 0.8 };
            updateCropDOM();
        }

        function updateCropDOM() {
            const canvas = document.getElementById('imgCanvas'); const rect = canvas.getBoundingClientRect();
            if(cropState.x < 0) cropState.x = 0; if(cropState.y < 0) cropState.y = 0;
            if(cropState.x + cropState.w > rect.width) cropState.w = rect.width - cropState.x;
            if(cropState.y + cropState.h > rect.height) cropState.h = rect.height - cropState.y;
            if(cropState.w < 20) cropState.w = 20; if(cropState.h < 20) cropState.h = 20;

            const box = document.getElementById('cropBox');
            document.getElementById('maskTop').style.height = cropState.y + 'px';
            document.getElementById('maskBottom').style.top = (cropState.y + cropState.h) + 'px';
            document.getElementById('maskLeft').style.top = cropState.y + 'px';
            document.getElementById('maskLeft').style.height = cropState.h + 'px';
            document.getElementById('maskLeft').style.width = cropState.x + 'px';
            document.getElementById('maskRight').style.top = cropState.y + 'px';
            document.getElementById('maskRight').style.height = cropState.h + 'px';
            document.getElementById('maskRight').style.left = (cropState.x + cropState.w) + 'px';

            box.style.left = cropState.x + 'px'; box.style.top = cropState.y + 'px';
            box.style.width = cropState.w + 'px'; box.style.height = cropState.h + 'px';
        }

        function initCropEvents() {
            const overlay = document.getElementById('cropOverlay');
            const newOverlay = overlay.cloneNode(true); overlay.parentNode.replaceChild(newOverlay, overlay);
            
            const handleMove = (e) => {
                if (!cropDragInfo.isDragging || editorMode !== 'crop') return;
                const dx = (e.touches ? e.touches[0].clientX : e.clientX) - cropDragInfo.startX;
                const dy = (e.touches ? e.touches[0].clientY : e.clientY) - cropDragInfo.startY;
                const init = cropDragInfo.initCrop;

                if (cropDragInfo.type === 'move') { cropState.x = init.x + dx; cropState.y = init.y + dy; } 
                else {
                    if (cropDragInfo.type.includes('w')) { cropState.x = init.x + dx; cropState.w = init.w - dx; }
                    if (cropDragInfo.type.includes('e')) { cropState.w = init.w + dx; }
                    if (cropDragInfo.type.includes('n')) { cropState.y = init.y + dy; cropState.h = init.h - dy; }
                    if (cropDragInfo.type.includes('s')) { cropState.h = init.h + dy; }
                }
                updateCropDOM();
            };

            const handleUp = () => {
                cropDragInfo.isDragging = false;
                window.removeEventListener('mousemove', handleMove); window.removeEventListener('mouseup', handleUp);
                window.removeEventListener('touchmove', handleMove); window.removeEventListener('touchend', handleUp);
            };

            const handleDown = (e) => {
                if (editorMode !== 'crop') return;
                const type = e.target.dataset.handle || (e.target.id === 'cropBox' ? 'move' : null);
                if (!type) return;

                cropDragInfo.isDragging = true; cropDragInfo.type = type;
                cropDragInfo.startX = e.touches ? e.touches[0].clientX : e.clientX;
                cropDragInfo.startY = e.touches ? e.touches[0].clientY : e.clientY;
                cropDragInfo.initCrop = { ...cropState };
                e.preventDefault(); e.stopPropagation();

                window.addEventListener('mousemove', handleMove); window.addEventListener('mouseup', handleUp);
                window.addEventListener('touchmove', handleMove, {passive: false}); window.addEventListener('touchend', handleUp);
            };

            newOverlay.addEventListener('mousedown', handleDown); newOverlay.addEventListener('touchstart', handleDown, {passive: false});
        }

        function setEditorMode(mode) {
            editorMode = mode;
            const drawBtn = document.getElementById('btnModeDraw'); const cropBtn = document.getElementById('btnModeCrop');
            const guideText = document.getElementById('editorGuideText'); const overlay = document.getElementById('cropOverlay');
            const execBtn = document.getElementById('btnExecuteCrop');
            
            if (mode === 'draw') {
                drawBtn.classList.replace('bg-white', 'bg-toss-grey-900'); drawBtn.classList.add('text-white');
                cropBtn.classList.replace('bg-toss-grey-900', 'bg-white'); cropBtn.classList.remove('text-white');
                guideText.innerText = '이미지 위에서 마우스를 드래그하여 그려보세요.';
                overlay.classList.add('hidden'); execBtn.classList.add('hidden');
            } else {
                cropBtn.classList.replace('bg-white', 'bg-toss-grey-900'); cropBtn.classList.add('text-white');
                drawBtn.classList.replace('bg-toss-grey-900', 'bg-white'); drawBtn.classList.remove('text-white');
                guideText.innerText = '모서리나 테두리를 드래그하여 자를 영역을 조절하세요.';
                overlay.classList.remove('hidden'); execBtn.classList.remove('hidden');
                initCropState(); lucide.createIcons();
            }
        }

        function executeCrop() {
            const canvas = document.getElementById('imgCanvas'); const ctx = canvas.getContext('2d');
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width; const scaleY = canvas.height / rect.height;
            const targetX = cropState.x * scaleX; const targetY = cropState.y * scaleY;
            const targetW = cropState.w * scaleX; const targetH = cropState.h * scaleY;

            const imgData = ctx.getImageData(targetX, targetY, targetW, targetH);
            canvas.width = targetW; canvas.height = targetH; ctx.putImageData(imgData, 0, 0);
            originalImg.src = canvas.toDataURL();
            showToast('성공적으로 잘라냈습니다.', 'success'); setEditorMode('draw');
        }

        function resetEditor() {
            if (currentImgIndex === -1) return;
            imageFilesData[currentImgIndex].editedUrl = URL.createObjectURL(imageFilesData[currentImgIndex].file);
            openImageEditor(currentImgIndex);
            showToast('원본으로 되돌렸습니다.', 'default');
        }

        function applyEditorChanges() {
            if (currentImgIndex === -1) return;
            const canvas = document.getElementById('imgCanvas');
            imageFilesData[currentImgIndex].editedUrl = canvas.toDataURL();
            closeImageEditor(); renderImageThumbnails(); showToast('편집 내역이 임시 저장되었습니다.', 'success');
        }

        async function handleGenerate() {
            const inputEl = document.getElementById('aiInput'); const resultArea = document.getElementById('resultArea');
            const skeleton = document.getElementById('loadingSkeleton'); const outputContent = document.getElementById('outputContent');
            const copyBtn = document.getElementById('copyBtn');
            const inputText = inputEl.value.trim();
            if (!inputText) { showToast('상황을 입력해주세요.', 'default'); inputEl.focus(); return; }

            const toneEl = document.getElementById('aiTone'); const lengthEl = document.getElementById('aiLength');
            const toneStr = toneEl ? ` 어조는 [${toneEl.value}]로,` : ''; const lengthStr = lengthEl ? ` 길이는 [${lengthEl.value}] 작성해줘.` : '';
            const extraPrompt = (toneEl || lengthEl) ? `\n\n요청사항:${toneStr}${lengthStr}` : '';

            resultArea.classList.remove('hidden'); skeleton.classList.remove('hidden'); outputContent.classList.add('hidden'); copyBtn.classList.add('hidden');

            try {
                await new Promise(resolve => setTimeout(resolve, 1500));
                const result = `[Mockup 결과]\n\n상황: ${inputText}\n옵션: ${toneEl?toneEl.value:''} / ${lengthEl?lengthEl.value:''}\n\nGitHub Pages 공개 배포본에서는 API 키를 클라이언트에 포함하지 않습니다.`;
                outputContent.innerText = result;
                skeleton.classList.add('hidden'); outputContent.classList.remove('hidden'); copyBtn.classList.remove('hidden');
                saveHistory(state.currentTool.name, result);
            } catch (error) { skeleton.classList.add('hidden'); showToast('오류가 발생했습니다.', 'default'); }
        }

        function processImage() {
            if (imageFilesData.length === 0) return showToast('먼저 이미지를 선택해주세요.', 'default');
            const format = document.getElementById('imageFormat').value; const quality = parseFloat(document.getElementById('imageQuality').value);
            const resizeMode = document.querySelector('input[name="resizeMode"]:checked').value;
            const scale = parseFloat(document.getElementById('imageScale').value); const pixelWidth = parseInt(document.getElementById('imagePixelWidth').value);

            if (resizeMode === 'pixel' && (!pixelWidth || pixelWidth <= 0)) return showToast('유효한 가로 픽셀 크기를 입력해주세요.', 'default');
            showToast('변환 및 다운로드 중...', 'default');

            const processSingle = (imgData, idx, zip) => {
                return new Promise((resolve) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let targetW = resizeMode === 'scale' ? img.width * scale : pixelWidth;
                        let targetH = resizeMode === 'scale' ? img.height * scale : img.height * (pixelWidth / img.width);
                        canvas.width = targetW; canvas.height = targetH; canvas.getContext('2d').drawImage(img, 0, 0, targetW, targetH);
                        const dataUrl = canvas.toDataURL(format, quality);
                        const fileName = `converted_${idx+1}.${format.split('/')[1]}`;
                        if (zip) { zip.file(fileName, dataUrl.split(',')[1], {base64: true}); resolve(); } 
                        else { const a = document.createElement('a'); a.href = dataUrl; a.download = fileName; a.click(); resolve(); }
                    };
                    img.src = imgData.editedUrl;
                });
            };

            if (imageFilesData.length === 1) { processSingle(imageFilesData[0], 0, null).then(() => showToast('다운로드 완료!', 'success')); } 
            else {
                if (typeof JSZip === 'undefined') return showToast('압축 모듈 로드 중', 'default');
                const zip = new JSZip();
                Promise.all(imageFilesData.map((imgData, i) => processSingle(imgData, i, zip))).then(async () => {
                    const blob = await zip.generateAsync({ type: 'blob' });
                    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'converted_images.zip'; a.click();
                    showToast('모든 이미지 ZIP 변환 완료!', 'success');
                });
            }
        }

        async function processPdfMerge() {
            if (typeof PDFLib === 'undefined') return showToast('로드 중입니다.', 'default');
            const input = document.getElementById('pdfMergeInput');
            if (!input || !input.files || input.files.length < 2) return showToast('2개 이상 선택해주세요.', 'default');
            try {
                showToast('합치기 시작...', 'default'); const pdfDoc = await PDFLib.PDFDocument.create();
                for (let i = 0; i < input.files.length; i++) {
                    const loadedPdf = await PDFLib.PDFDocument.load(await input.files[i].arrayBuffer());
                    const copiedPages = await pdfDoc.copyPages(loadedPdf, loadedPdf.getPageIndices());
                    copiedPages.forEach((page) => pdfDoc.addPage(page));
                }
                const blob = new Blob([await pdfDoc.save()], { type: 'application/pdf' });
                const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'merged.pdf'; a.click();
                showToast('합치기 성공!', 'success');
            } catch (e) { showToast('오류 발생', 'default'); }
        }

        async function processPdfSplit() {
            const input = document.getElementById('pdfSplitInput'); const rangeInput = document.getElementById('pdfSplitRange').value.trim();
            if (!input || !input.files || input.files.length === 0) return showToast('파일을 선택해주세요.', 'default');
            if (!rangeInput) return showToast('추출 범위를 입력해주세요.', 'default');
            try {
                showToast('PDF 분할 중...', 'default');
                const pdfBytes = await input.files[0].arrayBuffer(); const pdfDoc = await PDFLib.PDFDocument.load(pdfBytes);
                const newPdf = await PDFLib.PDFDocument.create(); const totalPages = pdfDoc.getPageCount();
                let indices = new Set();
                rangeInput.split(',').forEach(p => {
                    if (p.includes('-')) {
                        const [start, end] = p.split('-').map(Number);
                        if (start && end && start <= end) for(let i=start; i<=end; i++) indices.add(i-1);
                    } else { const num = Number(p); if (num) indices.add(num-1); }
                });
                const finalIndices = Array.from(indices).filter(i => i >= 0 && i < totalPages).sort((a,b)=>a-b);
                if (finalIndices.length === 0) return showToast('유효한 범위가 아닙니다.', 'default');
                const copiedPages = await newPdf.copyPages(pdfDoc, finalIndices);
                copiedPages.forEach((page) => newPdf.addPage(page));
                const blob = new Blob([await newPdf.save()], { type: 'application/pdf' });
                const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'split_document.pdf'; a.click();
                showToast('분할 완료!', 'success');
            } catch (e) { showToast('오류 발생', 'default'); }
        }

        async function processPdfCompress() {
            const input = document.getElementById('pdfCompressInput');
            if (!input || !input.files || input.files.length === 0) return showToast('파일을 선택해주세요.', 'default');
            try {
                showToast('최적화 진행 중...', 'default');
                const pdfBytes = await input.files[0].arrayBuffer(); const pdfDoc = await PDFLib.PDFDocument.load(pdfBytes);
                pdfDoc.setTitle(''); pdfDoc.setAuthor(''); pdfDoc.setSubject(''); pdfDoc.setKeywords([]); pdfDoc.setProducer(''); pdfDoc.setCreator('');
                const blob = new Blob([await pdfDoc.save({ useObjectStreams: false })], { type: 'application/pdf' });
                const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'optimized.pdf'; a.click();
                showToast('최적화 완료!', 'success');
            } catch (e) { showToast('오류 발생', 'default'); }
        }

        function renderPdfViewerPreview(input) {
            const area = document.getElementById('pdfViewerArea');
            if (!input.files || input.files.length === 0) { area.innerHTML = ''; return; }
            area.innerHTML = `<div class="mt-4 n-border rounded-[16px] overflow-hidden bg-white fade-enter"><div class="bg-toss-grey-100 p-4 border-b-2.5 border-toss-grey-900 text-[13px] font-bold text-toss-grey-900 flex gap-3 leading-relaxed"><i data-lucide="info" class="w-5 h-5 flex-shrink-0"></i><p>브라우저에 내장된 고성능 PDF 뷰어입니다. 상단의 펜 도구를 사용하여 표시하고 다운로드 하세요.</p></div><iframe src="${URL.createObjectURL(input.files[0])}" class="w-full h-[60vh] border-none bg-white"></iframe></div>`;
            lucide.createIcons();
        }

        function processTextTool(action) {
            const input = document.getElementById('textToolInput').value;
            if (!input.trim()) return showToast('텍스트를 입력해주세요.', 'default');
            let result = input;
            if (action === 'remove-spaces') result = result.replace(/ /g, '');
            else if (action === 'remove-empty-lines') result = result.split('\n').filter(line => line.trim() !== '').join('\n');
            else if (action === 'remove-duplicates') result = [...new Set(result.split('\n'))].join('\n');
            else if (action === 'to-upper') result = result.toUpperCase();
            else if (action === 'to-lower') result = result.toLowerCase();
            else if (action === 'remove-special') result = result.replace(/[^가-힣a-zA-Z0-9\s]/g, '');
            document.getElementById('textToolOutput').value = result;
            showToast('처리 완료!', 'success');
        }

        async function processLinkTool(action) {
            const input = document.getElementById('linkToolInput').value;
            if (!input.trim()) return showToast('URL을 입력해주세요.', 'default');
            const outputEl = document.getElementById('linkToolOutput');

            if (action === 'utm') {
                outputEl.value = input.split('\n').map(urlStr => {
                    let trimmed = urlStr.trim(); if (!trimmed) return '';
                    try {
                        const hasProto = /^https?:\/\//i.test(trimmed); const url = new URL(hasProto ? trimmed : `http://${trimmed}`);
                        const toDelete = []; url.searchParams.forEach((v, k) => { if (k.toLowerCase().startsWith('utm_')) toDelete.push(k); });
                        toDelete.forEach(k => url.searchParams.delete(k));
                        return hasProto ? url.toString() : url.toString().replace(/^http:\/\//i, '');
                    } catch (e) { return trimmed; }
                }).filter(u => u).join('\n');
                showToast('UTM 제거 완료!', 'success');
            } 
            else if (action === 'encode') { outputEl.value = encodeURIComponent(input); showToast('인코딩 완료!', 'success'); }
            else if (action === 'decode') { try { outputEl.value = decodeURIComponent(input); showToast('디코딩 완료!', 'success'); } catch(e) { showToast('유효하지 않은 인코딩입니다.', 'default'); } }
            else if (action === 'shorten') {
                const firstUrl = input.split('\n')[0].trim();
                if(!/^https?:\/\//i.test(firstUrl)) return showToast('http:// 또는 https:// 로 시작하는 1개의 URL만 가능합니다.', 'default');
                try {
                    const res = await fetch(`https://is.gd/create.php?format=json&url=${encodeURIComponent(firstUrl)}`);
                    const data = await res.json();
                    if(data.shorturl) { outputEl.value = data.shorturl; showToast('단축 URL 생성 완료!', 'success'); } else throw new Error();
                } catch(e) { showToast('단축 실패. 올바른 주소인지 확인해주세요.', 'default'); }
            }
        }

        function generateQR() {
            const input = document.getElementById('qrToolInput').value;
            if (!input.trim()) return showToast('내용을 입력해주세요.', 'default');
            const color = document.getElementById('qrColor').value; const size = document.getElementById('qrSize').value;
            const img = document.getElementById('qrImage');
            img.onload = () => { document.getElementById('qrResultArea').classList.remove('hidden'); showToast('QR코드 생성 완료!', 'success'); };
            img.src = `https://api.qrserver.com/v1/create-qr-code/?size=${size}&color=${color}&data=${encodeURIComponent(input.trim())}`;
        }

        async function processFileRename() {
            if (typeof JSZip === 'undefined') return showToast('기능 로드 중입니다.', 'default');
            const input = document.getElementById('fileRenameInput');
            const prefix = document.getElementById('filePrefix').value.trim(); const suffix = document.getElementById('fileSuffix').value.trim();
            let startNum = parseInt(document.getElementById('fileStartNum').value) || 1;
            if (!input.files || input.files.length === 0) return showToast('파일을 선택해주세요.', 'default');

            try {
                showToast('파일 압축 중...', 'default');
                const zip = new JSZip();
                for (let i = 0; i < input.files.length; i++) {
                    const file = input.files[i]; const extMatch = file.name.match(/\.([^.]+)$/); const ext = extMatch ? `.${extMatch[1]}` : '';
                    zip.file(`${prefix}${startNum + i}${suffix}${ext}`, file);
                }
                const blob = await zip.generateAsync({ type: 'blob' });
                const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `renamed_files.zip`; a.click();
                showToast('일괄 변경 완료!', 'success');
            } catch (e) { showToast('오류 발생', 'default'); }
        }

        function addMockTodo() {
            const input = document.getElementById('todoInput'); const priority = document.getElementById('todoPriority').value;
            const text = input.value.trim(); if(!text) return;
            const ul = document.getElementById('todoList'); const li = document.createElement('li');
            li.className = "flex items-center gap-3 p-3 bg-white n-border rounded-[12px] group fade-enter";
            li.innerHTML = `<input type="checkbox" class="w-5 h-5 n-input cursor-pointer"><span class="text-[13px] font-bold ${priority.includes('높음') ? 'text-toss-red-500' : 'text-toss-grey-900'}">${priority}</span><span class="text-[15px] font-bold text-toss-grey-900 flex-1">${escapeHtml(text)}</span><button onclick="this.parentElement.remove()" class="n-btn-sm bg-white p-1 text-toss-red-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button>`;
            ul.insertBefore(li, ul.firstChild); input.value = ''; lucide.createIcons();
        }

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container'); const toast = document.createElement('div');
            toast.className = `n-card bg-toss-grey-900 text-white px-5 py-3 text-[14px] font-bold transform transition-all duration-300 translate-y-10 opacity-0 mb-2 z-[9999]`;
            toast.innerText = message; container.appendChild(toast);
            setTimeout(() => toast.classList.remove('translate-y-10', 'opacity-0'), 10);
            setTimeout(() => { toast.classList.add('opacity-0', 'translate-y-10'); setTimeout(() => toast.remove(), 300); }, 2500);
        }

        function copyText(text) {
            const textarea = document.createElement('textarea'); textarea.value = text; textarea.style.position = 'fixed'; document.body.appendChild(textarea); textarea.select();
            try { document.execCommand('copy'); showToast('복사되었습니다.', 'success'); } catch (err) { showToast('실패했습니다.', 'default'); }
            document.body.removeChild(textarea);
        }

        function saveHistory(toolName, result) {
            const date = new Date().toLocaleDateString('ko-KR', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
            state.history.unshift({ toolName, result, date }); if (state.history.length > 30) state.history.pop();
            localStorage.setItem('work_survival_history', JSON.stringify(state.history));
        }

        function escapeHtml(unsafe) { return unsafe.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;"); }

        function attachEventListeners() {
            const searchInput = document.getElementById('searchInput');
            if (searchInput) { searchInput.addEventListener('input', (e) => { state.searchQuery = e.target.value; renderView(); const newSearchInput = document.getElementById('searchInput'); if(newSearchInput) newSearchInput.focus(); }); }
            const generateBtn = document.getElementById('generateBtn');
            if (generateBtn) generateBtn.addEventListener('click', handleGenerate);
            const copyBtn = document.getElementById('copyBtn');
            if (copyBtn) copyBtn.addEventListener('click', () => { copyText(document.getElementById('outputContent').innerText); });
        }

        function renderSaved() {
            return `
                <div class="fade-enter max-w-[800px] mx-auto w-full px-5 pt-8">
                    <header class="mb-8"><h1 class="text-[28px] font-bold text-toss-grey-900">저장함</h1><p class="text-[15px] font-bold text-toss-grey-600 mt-2">생성했던 결과물들</p></header>
                    <div class="flex flex-col gap-4">
                        ${state.history.length === 0 ? `<div class="text-center py-20 n-card"><p class="text-toss-grey-900 font-bold">저장된 내역이 없습니다.</p></div>` : 
                        state.history.map((item) => `
                            <article class="n-card p-6">
                                <div class="flex justify-between items-center mb-3"><span class="n-border-sm bg-toss-blue-50 text-toss-blue-600 text-[12px] font-bold px-2 py-1 rounded-[8px]">${item.toolName}</span><span class="text-[13px] text-toss-grey-500 font-bold">${item.date}</span></div>
                                <p class="text-[15px] font-bold text-toss-grey-900 leading-relaxed mb-4 whitespace-pre-wrap">${escapeHtml(item.result)}</p>
                                <button onclick="copyText('${escapeHtml(item.result)}')" class="w-full n-btn bg-white text-toss-grey-900 text-[14px] py-3">복사하기</button>
                            </article>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        let fakeInterval = null;
        function openFakeScreen(type) {
            const overlay = document.getElementById('fakeOverlay'); const content = document.getElementById('fakeContent'); overlay.classList.remove('hidden');
            if (type === 'code') {
                content.innerHTML = `<div class="bg-black w-full h-full text-green-500 font-mono text-sm p-4 overflow-hidden relative"><pre class="hacker-scroll absolute bottom-0 w-full whitespace-pre-wrap"></pre></div>`;
                let codeLines = ["Checking dependencies...", "npm install", "Resolving packages...", "Starting server...", "Compiling...", "Compiled successfully!", "Connecting to DB..."];
                const pre = content.querySelector('pre'); let html = '';
                for(let i=0; i<80; i++) html += codeLines[Math.floor(Math.random()*codeLines.length)] + "\n";
                pre.innerText = html;
                fakeInterval = setInterval(() => { pre.innerText += codeLines[Math.floor(Math.random()*codeLines.length)] + "\n"; }, 150);
            } else if (type === 'doc') {
                content.innerHTML = `<div class="bg-gray-100 w-full h-full flex justify-center py-10 overflow-hidden"><div class="bg-white w-[800px] h-[1200px] shadow-lg p-16 font-serif"><h1 class="text-3xl font-bold mb-8 text-center border-b pb-4">2026 신규 기획안</h1><p class="mb-4">본 기획안은 시장 환경에 대응하기 위함임.</p><div class="h-4 bg-gray-200 w-full mb-2 mt-8"></div><div class="h-4 bg-gray-200 w-5/6 mb-2"></div></div></div>`;
            } else if (type === 'email') {
                content.innerHTML = `<div class="bg-white w-full h-full flex flex-col font-sans"><div class="bg-blue-600 h-12 px-4 flex items-center text-white font-bold">Mailbox</div><div class="p-4 border-b"><div class="font-bold text-sm">김팀장</div><div class="text-sm">주간 보고서 제출 건</div></div></div>`;
            } else if (type === 'meeting') {
                content.innerHTML = `<div class="bg-gray-900 w-full h-full p-4 flex flex-col"><div class="text-white text-lg font-bold mb-4">주간 업무 보고</div><div class="flex-1 grid grid-cols-3 grid-rows-2 gap-4"><div class="bg-gray-800 rounded-lg flex items-center justify-center border-2 border-green-500"><div class="w-24 h-24 rounded-full bg-blue-500 flex items-center justify-center text-white text-3xl">나</div></div></div></div>`;
            }
        }

        function closeFakeScreen() { document.getElementById('fakeOverlay').classList.add('hidden'); document.getElementById('fakeContent').innerHTML = ''; if (fakeInterval) clearInterval(fakeInterval); }
    </script>
</body>
