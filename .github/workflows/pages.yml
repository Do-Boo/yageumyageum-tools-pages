name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Prepare Pages artifact
        shell: bash
        run: |
          rm -rf dist
          cp -R public dist
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          SITE_URL="${{ vars.PAGES_SITE_URL }}"
          if [ -z "$SITE_URL" ]; then
            SITE_URL="https://${GITHUB_REPOSITORY_OWNER}.github.io/${REPO_NAME}/"
          fi
          SITE_URL="${SITE_URL%/}/"
          perl -0pi -e "s#https://tools.yageumyageum.app/#$ENV{SITE_URL}#g" dist/index.html dist/sitemap.xml
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4
